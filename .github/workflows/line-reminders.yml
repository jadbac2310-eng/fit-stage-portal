name: LINE reminders

# レッスン開始30分前のLINEリマインドを送る。
# Vercel Hobbyのcronは1日1回までなので、5分おきの定期実行はGitHub Actionsで行う。
# エンドポイント側で送信済みログを持つため、多少重複して叩いても二重送信はされない。

on:
  schedule:
    - cron: "*/5 * * * *"   # 5分おき（GitHub Actionsの最小間隔）
  workflow_dispatch:          # 手動実行も可

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder cron
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -fsS -m 30 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "https://fit-stage-portal.vercel.app/api/cron/line-reminders"
